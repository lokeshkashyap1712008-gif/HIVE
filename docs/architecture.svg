<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-label="HIVE architecture: User to Alibaba SAS to Qwen Cloud">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1419"/>
      <stop offset="100%" stop-color="#1a2332"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L10,3 L0,6 Z" fill="#7dd3fc"/>
    </marker>
  </defs>
  <rect width="960" height="560" fill="url(#bg)"/>
  <text x="48" y="48" fill="#f8fafc" font-family="Georgia, serif" font-size="28" font-weight="700">HIVE  Agent Society Architecture</text>
  <text x="48" y="78" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14">Qwen Cloud Hackathon · Track: Agent Society · Alibaba Cloud + DashScope</text>

  <!-- User -->
  <rect x="48" y="140" width="180" height="90" rx="8" fill="#1e293b" stroke="#38bdf8" stroke-width="2"/>
  <text x="138" y="178" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="16" font-weight="600">User</text>
  <text x="138" y="202" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">CLI / Ink TUI</text>

  <line x1="228" y1="185" x2="300" y2="185" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Alibaba box -->
  <rect x="300" y="110" width="360" height="320" rx="12" fill="#0c1929" stroke="#f59e0b" stroke-width="2"/>
  <text x="480" y="140" text-anchor="middle" fill="#fbbf24" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">ALIBABA CLOUD (SAS / ECS)</text>

  <rect x="330" y="160" width="300" height="70" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="480" y="190" text-anchor="middle" fill="#f8fafc" font-family="ui-sans-serif, system-ui, sans-serif" font-size="15" font-weight="600">HIVE Core (Queen Bee)</text>
  <text x="480" y="212" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="11">deploy_server :8080 · python -m hive</text>

  <rect x="330" y="250" width="140" height="60" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="400" y="275" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">SQLite</text>
  <text x="400" y="295" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">/data/hive</text>

  <rect x="490" y="250" width="140" height="60" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="560" y="275" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">Workers</text>
  <text x="560" y="295" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">Forge · Debate · Scouts</text>

  <rect x="330" y="330" width="300" height="70" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1.5"/>
  <text x="480" y="360" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="13">Economy · Reputation · Message Bus</text>
  <text x="480" y="382" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">Temporary agent societies</text>

  <line x1="660" y1="250" x2="740" y2="250" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Qwen -->
  <rect x="740" y="180" width="180" height="140" rx="8" fill="#1e293b" stroke="#a78bfa" stroke-width="2"/>
  <text x="830" y="220" text-anchor="middle" fill="#c4b5fd" font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" font-weight="700">Qwen Cloud</text>
  <text x="830" y="245" text-anchor="middle" fill="#e2e8f0" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">DashScope API</text>
  <text x="830" y="270" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">dashscope-intl&</text>
  <text x="830" y="292" text-anchor="middle" fill="#94a3b8" font-family="ui-sans-serif, system-ui, sans-serif" font-size="10">qwen3.7-plus / max</text>

  <text x="48" y="500" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Proof of API: hive/llm.py · Proof of runtime: SAS Workbench + GET /health on :8080</text>
  <text x="48" y="525" fill="#64748b" font-family="ui-sans-serif, system-ui, sans-serif" font-size="12">Repo: github.com/lokeshkashyap1712008-gif/HIVE</text>
</svg>
