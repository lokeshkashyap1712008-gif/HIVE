<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Registry — HIVE OS</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;500;600;700&family=Rubik:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    body { background: var(--void); }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:var(--sp-6); }
    .agent-row { display:flex; gap:var(--sp-4); align-items:center; padding:var(--sp-4) 0; border-bottom:1px solid var(--border-dim); }
    .agent-row:hover { background:rgba(157,78,221,0.04); }
    .agent-row:last-child { border-bottom:none; }
    .agent-row-left { display:flex; gap:var(--sp-4); align-items:center; flex:1; min-width:0; }
    .agent-row-avatar { width:44px; height:44px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.25rem; flex-shrink:0; }
    .agent-row-name { font-family:var(--font-heading); font-size:0.9375rem; color:var(--white); }
    .agent-row-role { font-family:var(--font-mono); font-size:0.625rem; color:var(--ash); text-transform:uppercase; letter-spacing:0.06em; }
    .agent-row-right { display:flex; gap:var(--sp-4); align-items:center; flex-shrink:0; }
    .agent-cost { font-family:var(--font-mono); font-size:0.8125rem; color:var(--gold); }
    .agent-tasks { font-family:var(--font-mono); font-size:0.8125rem; color:var(--ash); }
    .spawn-form { background:var(--chapel); border:1px solid var(--border-dim); border-radius:var(--r-xl); padding:var(--sp-6); margin-bottom:var(--sp-6); }
    .spawn-form-row { display:flex; gap:var(--sp-4); align-items:flex-end; }
  </style>
</head>
<body class="crt">
  <nav class="nav">
    <a href="index.html" class="nav-logo">HIVE<span>OS</span></a>
    <div class="nav-links">
      <a href="index.html"       class="nav-link">Home</a>
      <a href="terminal.html"    class="nav-link">Terminal</a>
      <a href="dashboard.html"   class="nav-link">Dashboard</a>
      <a href="arena.html"       class="nav-link">Arena</a>
      <a href="agents.html"      class="nav-link active">Agents</a>
      <a href="economy.html"      class="nav-link">Economy</a>
      <a href="tasks.html"       class="nav-link">Tasks</a>
      <a href="benchmarks.html"  class="nav-link">Benchmarks</a>
    </div>
    <div class="nav-status"><div class="status-dot"></div><span id="nav-status-text">initializing</span></div>
  </nav>

  <div class="page">
    <div class="container" style="padding-top:var(--sp-8);">

      <div class="page-header">
        <div>
          <h1 style="font-size:1.75rem;">Agent Registry</h1>
          <p style="color:var(--ash); font-size:0.875rem; margin:0;">Manage, spawn, and monitor all agents</p>
        </div>
        <div style="display:flex; gap:var(--sp-3);">
          <button class="btn btn-neon" onclick="spawnModal()">+ Spawn Agent</button>
          <button class="btn btn-danger" onclick="pruneModal()">🗑 Cleanup Idle</button>
        </div>
      </div>

      <!-- Spawn form -->
      <div class="spawn-form" id="spawn-form" style="display:none;">
        <h3 style="font-size:1rem; margin-bottom:var(--sp-4);">Spawn New Agent</h3>
        <div class="spawn-form-row">
          <div style="flex:1;">
            <label>Agent Type</label>
            <select class="input" id="spawn-type">
              <option value="">Select type...</option>
              <option value="WebScout">WebScout — Web search & analysis</option>
              <option value="Diagnostician">Diagnostician — System health checks</option>
              <option value="ReportAgent">ReportAgent — Report generation</option>
              <option value="CodeRunner">CodeRunner — Code execution</option>
              <option value="DataAnalyst">DataAnalyst — Data processing</option>
              <option value="SecurityScout">SecurityScout — Security auditing</option>
              <option value="SchedulerAgent">SchedulerAgent — Task scheduling</option>
              <option value="GPUtuner">GPUtuner — GPU optimization</option>
              <option value="CloudTester">CloudTester — Cloud deployment testing</option>
              <option value="CommunicatorAgent">CommunicatorAgent — External comms</option>
              <option value="AccountManager">AccountManager — Account management</option>
              <option value="CodeArchitect">CodeArchitect — Architecture design</option>
              <option value="RedTeamAgent">RedTeamAgent — Adversarial testing</option>
              <option value="PaymentAgent">PaymentAgent — Payment processing</option>
            </select>
          </div>
          <div style="flex:1;">
            <label>Name (optional)</label>
            <input class="input" id="spawn-name" placeholder="auto-generated if empty">
          </div>
          <button class="btn btn-gothic" onclick="spawnAgent()">Spawn</button>
          <button class="btn btn-ghost" onclick="document.getElementById('spawn-form').style.display='none'">Cancel</button>
        </div>
      </div>

      <!-- Agent table -->
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">All Registered Agents</span>
          <div style="display:flex; gap:var(--sp-3); align-items:center;">
            <span class="badge badge-online" id="agent-count-badge">-- agents</span>
            <button class="btn btn-ghost btn-sm" onclick="loadAgents()">↻ Refresh</button>
          </div>
        </div>
        <div id="agent-list" style="padding:var(--sp-4) var(--sp-6);">
          <!-- Populated by JS -->
          <div class="empty-state">
            <div class="spinner" style="margin:0 auto;"></div>
            <p style="margin-top:var(--sp-4);">Loading agent registry...</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script>
    const AVATARS = ['🤖','🔍','💻','📊','🔧','🛡️','☁️','📝','💰','🔮','⚡','📡','🎯','🔋','🧠','💬','🌐','📁'];
    const AGENT_COLORS = {
      'HiveCore':'#c41e3a','AgentForge':'#c8a84b','CleanupCrew':'#d44a3a',
      'WebScout':'#00f5d4','Diagnostician':'#00b4d8','ReportAgent':'#c8a84b',
      'DataAnalyst':'#39ff14','SchedulerAgent':'#9d4edd','SecurityScout':'#f72585',
      'CodeArchitect':'#00ff41','GPUtuner':'#ff6b35','RedTeamAgent':'#c41e3a',
      'CloudTester':'#00b4d8','CommunicatorAgent':'#f72585','AccountManager':'#c8a84b',
      'CodeRunner':'#39ff14','PaymentAgent':'#c8a84b',
    };

    function getAvatar(name) {
      const idx = [...(name||'')].reduce((a,c) => a + c.charCodeAt(0), 0) % AVATARS.length;
      return AVATARS[idx];
    }

    function getAgentColor(name) { return AGENT_COLORS[name] || '#9d4edd'; }

    function getRoleIcon(role) {
      if (role === 'leader')    return '👑';
      if (role === 'creator')   return '🔨';
      if (role === 'destructor')return '⚰';
      return '🤖';
    }

    function stateBadge(state) {
      if (state === 'active')  return '<span class="badge badge-online">active</span>';
      if (state === 'error')   return '<span class="badge badge-error">error</span>';
      if (state === 'spawning')return '<span class="badge badge-gold">spawning</span>';
      return '<span class="badge badge-offline">idle</span>';
    }

    function renderAgentRow(a) {
      const cost  = a.total_cost  || 0;
      const tasks = a.tasks_done  || 0;
      const state = a.state       || 'idle';
      const emotion = a.emotion    || 'idle';
      const color  = getAgentColor(a.name);
      const badge  = stateBadge(state);

      return `
        <div class="agent-row">
          <div class="agent-row-left">
            <div class="agent-row-avatar" style="background:${color}22; border:1px solid ${color}44;">${getAvatar(a.name)}</div>
            <div>
              <div class="agent-row-name">${a.name || a.id || 'Unknown'}</div>
              <div class="agent-row-role">${getRoleIcon(a.role)} ${a.role || a.type || 'worker'}</div>
            </div>
          </div>
          <div style="display:flex; gap:var(--sp-3); align-items:center;">
            <span class="badge badge-${emotion === 'confident' ? 'online' : emotion === 'stressed' ? 'error' : emotion === 'excited' ? 'gold' : emotion === 'curious' ? 'info' : 'offline'}">${emotion}</span>
            ${badge}
          </div>
          <div class="agent-row-right">
            <span class="agent-cost">$${cost}</span>
            <span class="agent-tasks">${tasks} tasks</span>
            ${a.role !== 'leader' && a.role !== 'creator' && a.role !== 'destructor' ? `<button class="btn btn-danger btn-sm" onclick="killAgent('${a.name || a.id}')" title="Kill agent">✕</button>` : ''}
          </div>
        </div>`;
    }

    async function loadAgents() {
      const data = await HIVE.apiGet('/api/agents/states');
      const list = document.getElementById('agent-list');

      if (data && data.agents) {
        document.getElementById('nav-status-text').textContent = 'online';
        document.getElementById('agent-count-badge').textContent = `${data.agents.length} agents`;

        if (data.agents.length === 0) {
          list.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🤖</div><h3>No agents registered</h3><p>Start the backend to register agents.</p></div>`;
          return;
        }

        list.innerHTML = data.agents.map(renderAgentRow).join('');
      } else {
        // Demo data
        document.getElementById('nav-status-text').textContent = 'demo mode';
        document.getElementById('agent-count-badge').textContent = '17 agents (demo)';
        const demo = [
          { name:'HiveCore',        role:'leader',      state:'active', emotion:'confident', total_cost:45, tasks_done:8 },
          { name:'AgentForge',      role:'creator',     state:'active', emotion:'calm',      total_cost:12, tasks_done:3 },
          { name:'CleanupCrew',     role:'destructor',  state:'idle',   emotion:'cautious',  total_cost:3,  tasks_done:1 },
          { name:'WebScout',        role:'worker',      state:'active', emotion:'curious',   total_cost:8,  tasks_done:4 },
          { name:'Diagnostician',   role:'worker',      state:'active', emotion:'cautious',  total_cost:15, tasks_done:6 },
          { name:'ReportAgent',     role:'worker',      state:'active', emotion:'excited',   total_cost:22, tasks_done:2 },
          { name:'CodeRunner',      role:'worker',      state:'idle',   emotion:'calm',      total_cost:5,  tasks_done:3 },
          { name:'DataAnalyst',     role:'worker',      state:'active', emotion:'curious',   total_cost:18, tasks_done:5 },
          { name:'GPUtuner',        role:'worker',      state:'active', emotion:'excited',   total_cost:30, tasks_done:2 },
          { name:'RedTeamAgent',    role:'worker',      state:'active', emotion:'confident', total_cost:25, tasks_done:3 },
          { name:'CloudTester',     role:'worker',      state:'idle',   emotion:'calm',      total_cost:7,  tasks_done:4 },
          { name:'SchedulerAgent',  role:'worker',      state:'active', emotion:'cautious',  total_cost:9,  tasks_done:7 },
          { name:'SecurityScout',   role:'worker',      state:'active', emotion:'confident', total_cost:11, tasks_done:2 },
          { name:'CommunicatorAgent',role:'worker',     state:'idle',   emotion:'idle',      total_cost:2,  tasks_done:1 },
          { name:'AccountManager', role:'worker',      state:'active', emotion:'calm',      total_cost:6,  tasks_done:3 },
          { name:'CodeArchitect',   role:'worker',      state:'active', emotion:'excited',   total_cost:35, tasks_done:1 },
          { name:'PaymentAgent',    role:'worker',      state:'idle',   emotion:'idle',      total_cost:0,  tasks_done:0 },
        ];
        list.innerHTML = demo.map(renderAgentRow).join('');
      }
    }

    function spawnModal() {
      document.getElementById('spawn-form').style.display = 'block';
      document.getElementById('spawn-form').scrollIntoView({ behavior: 'smooth' });
    }

    function pruneModal() {
      HIVE.showModal('Cleanup Crew', `
        <p style="color:var(--parchment);">Remove all idle agents to free budget?</p>
        <p style="color:var(--ash); font-size:0.8rem;">This will cull agents with no active tasks.</p>
      `, `
        <button class="btn btn-danger" onclick="cleanupPrune()">Remove Idle Agents</button>
        <button class="btn btn-ghost" onclick="this.closest('.modal-overlay').remove()">Cancel</button>
      `);
    }

    async function spawnAgent() {
      const type = document.getElementById('spawn-type').value;
      const name = document.getElementById('spawn-name').value;
      if (!type) { HIVE.showToast('Select an agent type', 'warning'); return; }
      const data = await HIVE.apiPost('/api/agents/spawn', { type, name });
      HIVE.showToast(data ? `Spawned ${data.name || type}` : 'Spawning via HiveCore...', 'success');
      document.getElementById('spawn-form').style.display = 'none';
      setTimeout(loadAgents, 1000);
    }

    async function killAgent(name) {
      const data = await HIVE.apiPost('/api/agents/kill', { name });
      HIVE.showToast(data ? `${name} terminated` : `${name} kill signal sent`, 'info');
      setTimeout(loadAgents, 500);
    }

    async function cleanupPrune() {
      document.querySelector('.modal-overlay')?.remove();
      const data = await HIVE.apiPost('/api/cleanup/prune', {});
      HIVE.showToast(data ? `Removed ${data.removed || 0} idle agents` : 'Cleanup dispatched', 'info');
      setTimeout(loadAgents, 1000);
    }

    loadAgents();
    HIVE.startRefresh(loadAgents, 5000);
  </script>
</body>
</html>
